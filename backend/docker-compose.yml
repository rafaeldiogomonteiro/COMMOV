services:
  postgres:
    image: postgres:16-alpine
    container_name: commov-postgres
    environment:
      POSTGRES_DB: commov
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d commov"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: commov-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/commov?sslmode=disable
      DEFAULT_USER: ${DEFAULT_USER:-admin@commov.local}
      DEFAULT_USER_PASS: ${DEFAULT_USER_PASS:-admin123}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
