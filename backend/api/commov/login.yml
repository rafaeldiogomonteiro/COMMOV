info:
  name: login
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/login"
  body:
    type: json
    data: |-
      {
        "email": "admin@commov.local",
        "password": "admin123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() === 200) {
          bru.setVar("token", res.getBody().token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
